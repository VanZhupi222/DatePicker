<template>
  <div
    style="
      height: 25px;
      margin: 20px;
      margin-bottom: 150px;
      width: 251.38px;
      margin-left: 200px;
    "
  >
    <lightning-card style="height: 50px; margin-top: 0px">
      <div
        class="slds-form-element slds-dropdown-trigger slds-dropdown-trigger_click slds-is-open"
        style="margin-top: -25px"
      >
        <label class="slds-form-element__label" for="date-input-id-default">
          <abbr class="slds-required" title="required">* </abbr>{dateStartOrEnd}</label
        >
        <div
          class="slds-form-element__control slds-input-has-icon slds-input-has-icon_right"
        >
          <input
            type="text"
            id="date-input-id-default"
            placeholder="Please select a date.."
            class="slds-input"
            name="startDate"
            value={showDate}
            onclick={inputClickHandler}
            onchange={handleDateChange}
            style="width: 200px; margin-left: 30px;"
            required
            readonly
          />
          <lightning-button-icon
            class="slds-button slds-button_icon slds-input__icon slds-input__icon_right showCalendarButton"
            title="Select a date"
            size="small"
            onclick={inputClickHandler}
            icon-name="utility:date_input"
            alternative-text="Select a date"
          >
          </lightning-button-icon>
        </div>
        <div
          aria-hidden="false"
          aria-label="Date picker"
          name="datePicker"
          class="slds-datepicker slds-dropdown slds-dropdown_left"
          role="dialog"
          style="display: none; width: 400px; margin-top: 50px"
        >
          <div class="slds-datepicker__filter slds-grid">
            <div
              class="slds-datepicker__filter_month slds-grid slds-grid_align-spread slds-grow"
            >
              <div class="slds-align-middle">
                <button
                  class="slds-button slds-button_icon slds-button_icon-container prev"
                  title="Previous Month"
                  onclick={clickPreviousButton}
                >
                  《
                  <span class="slds-assistive-text">Previous Month</span>
                </button>
              </div>
              <h2
                aria-atomic="true"
                aria-live="assertive"
                class="slds-align-middle"
                id="defaultPicker-month"
              >
                {showMonth}
              </h2>
              <div class="slds-align-middle">
                <button
                  class="slds-button slds-button_icon slds-button_icon-container next"
                  title="Next Month"
                  onclick={clickNextButton}
                >
                  》
                  <span class="slds-assistive-text">Next Month</span>
                </button>
              </div>
            </div>
            <div class="slds-shrink-none">
              <label class="slds-assistive-text" for="defaultPicker_select"
                >Pick a Year</label
              >
              <div class="slds-select_container">
                <select
                  class="slds-select"
                  id="defaultPicker_select"
                  name="yearSelector"
                  onchange={selectorChangeHandler}
                >
                  <option
                    value={item.value}
                    for:each={Options}
                    for:item="item"
                    key={item.label}
                  >
                    {item.label}
                  </option>
                </select>
              </div>
            </div>
          </div>
          <table
            aria-labelledby="defaultPicker-month"
            aria-multiselectable="true"
            class="slds-datepicker__month"
            role="grid"
          >
            <thead>
              <tr id="rangeDefault_start-weekdays">
                <th
                  id="rangeDefault_start-Sunday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Sunday">Sun</abbr>
                </th>
                <th
                  id="rangeDefault_start-Monday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Monday">Mon</abbr>
                </th>
                <th
                  id="rangeDefault_start-Tuesday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Tuesday">Tue</abbr>
                </th>
                <th
                  id="rangeDefault_start-Wednesday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Wednesday">Wed</abbr>
                </th>
                <th
                  id="rangeDefault_start-Thursday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Thursday">Thu</abbr>
                </th>
                <th
                  id="rangeDefault_start-Friday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Friday">Fri</abbr>
                </th>
                <th
                  id="rangeDefault_start-Saturday"
                  scope="col"
                  style="width: 45.43px"
                >
                  <abbr title="Saturday">Sat</abbr>
                </th>
              </tr>
            </thead>
          </table>
          <table class="calendarTable">
            <template
              for:each={outputDays}
              for:item="item"
              if:false={item.isEndDate}
            >
              <tr key={item.index} class="slds-col slds-grid calendarCell">
                <template
                  for:each={item.items}
                  for:item="childItem"
                  if:false={childItem.disabled}
                >
                  <td
                    key={childItem.label}
                    class="slds-col slds-size_1-of-7 slds-grid slds-grid_vertical slds-align_absolute-center dateCell slds-text-heading_small"
                    style={childItem.style}
                    data-datestring={childItem.dateString}
                    data-datestatus={childItem.status}
                    onclick={datePickHandler}
                    title={childItem.holidayName}
                    role="gridcell"
                  >
                    {childItem.label}
                  </td>
                </template>
                <template
                  for:each={item.items}
                  for:item="childItem"
                  if:true={childItem.disabled}
                >
                  <td
                    key={childItem.label}
                    class="slds-col slds-size_1-of-7 slds-grid slds-grid_vertical slds-align_absolute-center disabledDateCell slds-text-heading_small"
                    style={childItem.style}
                    data-datestring={childItem.dateString}
                    data-datestatus={childItem.status}
                    onclick={datePickHandler}
                    title={childItem.holidayName}
                    role="gridcell"
                  >
                    {childItem.label}
                  </td>
                </template>
              </tr>
            </template>
            <template
              for:each={outputDays}
              for:item="item"
              if:true={item.isEndDate}
            >
              <tr key={item.index} class="slds-col slds-grid calendarCell">
                <template
                  for:each={item.items}
                  for:item="childItem"
                  if:true={childItem.disabled}
                >
                  <td
                    key={childItem.label}
                    class="slds-col slds-size_1-of-7 slds-grid slds-grid_vertical slds-align_absolute-center disabledDateCell slds-text-heading_small"
                    style={childItem.style}
                    data-datestring={childItem.dateString}
                    data-datestatus={childItem.status}
                    onclick={datePickHandler}
                    title={childItem.holidayName}
                    role="gridcell"
                  >
                    {childItem.label}
                  </td>
                </template>
                <template
                  for:each={item.items}
                  for:item="childItem"
                  if:false={childItem.disabled}
                >
                  <td
                    key={childItem.label}
                    class="slds-col slds-size_1-of-7 slds-grid slds-grid_vertical slds-align_absolute-center dateCell slds-text-heading_small"
                    style={childItem.style}
                    data-datestring={childItem.dateString}
                    data-datestatus={childItem.status}
                    onclick={datePickHandler}
                    title={childItem.holidayName}
                    role="gridcell"
                  >
                    {childItem.label}
                  </td>
                </template>
              </tr>
            </template>
          </table>
          <button
            class="slds-button slds-align_absolute-center slds-text-link"
            onclick={todayClickHandler}
          >
            Today
          </button>
        </div>
      </div>
    </lightning-card>
    <lightning-button
      label="Reset"
      onclick={handleResetClick}
      class="slds-size_1-of-6 slds-align_absolute-center"
    ></lightning-button>
  </div>
</template>
